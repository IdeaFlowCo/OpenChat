version: '3.8'

services:
  openchat:
    build: .
    container_name: openchat_app
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      - NEO4J_URI=${NEO4J_URI:-bolt://noos_neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - NOOS_API_URL=${NOOS_API_URL:-http://noos_api:4000/api}
    networks:
      - app_network

networks:
  app_network:
    external: true
    name: noos_default
